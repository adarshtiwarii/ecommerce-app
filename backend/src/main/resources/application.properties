spring.application.name=backend

# Database
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.initialization-fail-timeout=0

# Lazy initialization loads beans only when they are first needed.
spring.main.lazy-initialization=true

# Keep Hibernate statistics disabled in production.
spring.jpa.properties.hibernate.generate_statistics=false

# Keep Hibernate second-level and query caches disabled.
spring.jpa.properties.hibernate.cache.use_query_cache=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false

# JPA
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Server
server.port=${PORT:8080}
server.address=0.0.0.0

# JWT
app.jwtSecret=${JWT_SECRET:change-this-development-secret-to-a-strong-256-bit-value}
app.jwtExpirationMs=${JWT_EXPIRATION_MS:604800000}
app.mail.from=${APP_MAIL_FROM:no-reply@ecomart.local}
app.frontend.reset-url=${APP_FRONTEND_RESET_URL:http://localhost:3000/forgot-password}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Razorpay
razorpay.key-id=${RAZORPAY_KEY_ID:}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
razorpay.currency=${RAZORPAY_CURRENCY:INR}

# Warehouse
warehouse.name=${WAREHOUSE_NAME:Primary Warehouse}
warehouse.latitude=${WAREHOUSE_LATITUDE:28.6139}
warehouse.longitude=${WAREHOUSE_LONGITUDE:77.2090}
warehouse.base-delivery-hours=${WAREHOUSE_BASE_DELIVERY_HOURS:12}
warehouse.average-speed-km-per-hour=${WAREHOUSE_AVERAGE_SPEED_KM_PER_HOUR:35}

# File Upload
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.example.backend=INFO

# Keep-alive
app.keep-alive.enabled=true
app.keep-alive.interval-ms=600000
app.keep-alive.services[0]=https://ecommerce-app-rttb.onrender.com

# Gmail SMTP configuration
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
