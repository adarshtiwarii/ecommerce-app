# Production profile for the single-JAR EcoMart deployment.
spring.application.name=ecomart

# The server port defaults to 8080 and can be overridden by the hosting platform.
server.port=${PORT:8080}

# MySQL database configuration. Provide these values through environment variables in production.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate should validate the production schema instead of changing it automatically.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Static React build files are packaged under src/main/resources/static.
spring.web.resources.static-locations=classpath:/static/
spring.mvc.throw-exception-if-no-handler-found=false

# JWT configuration. JWT_SECRET must be a strong 256-bit secret in production.
app.jwtSecret=${JWT_SECRET}
app.jwtExpirationMs=${JWT_EXPIRATION_MS:604800000}
app.mail.from=${APP_MAIL_FROM:no-reply@ecomart.local}
app.frontend.reset-url=${APP_FRONTEND_RESET_URL:http://localhost:3000/forgot-password}

# Multipart upload limits.
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:100MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:100MB}

# Cloudinary credentials for product image uploads.
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Razorpay credentials for payment collection.
razorpay.key-id=${RAZORPAY_KEY_ID}
razorpay.key-secret=${RAZORPAY_KEY_SECRET}
razorpay.currency=${RAZORPAY_CURRENCY:INR}

# Warehouse origin used by delivery ETA calculations.
warehouse.name=${WAREHOUSE_NAME:Primary Warehouse}
warehouse.latitude=${WAREHOUSE_LATITUDE:28.6139}
warehouse.longitude=${WAREHOUSE_LONGITUDE:77.2090}
warehouse.base-delivery-hours=${WAREHOUSE_BASE_DELIVERY_HOURS:12}
warehouse.average-speed-km-per-hour=${WAREHOUSE_AVERAGE_SPEED_KM_PER_HOUR:35}

# Production logging stays concise.
logging.level.org.springframework.web=${SPRING_WEB_LOG_LEVEL:INFO}
logging.level.org.example.backend=${APP_LOG_LEVEL:INFO}
